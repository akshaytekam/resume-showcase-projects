version: '3.8'

x-airflow-common:
  &airflow-common

  image: apache/airflow:2.10.0

  environment:

    AIRFLOW__CORE__EXECUTOR: LocalExecutor

    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"

    AIRFLOW__SMTP__SMTP_HOST: smtp.gmail.com

    AIRFLOW__SMTP__SMTP_PORT: 587

    AIRFLOW__SMTP__SMTP_USER: support@company.com

    AIRFLOW__SMTP__SMTP_PASSWORD: password

    AIRFLOW__SMTP__SMTP_MAIL_FROM: support@company.com

  volumes:

    - ./airflow/dags:/opt/airflow/dags

    - ./airflow/logs:/opt/airflow/logs

    - ./validation:/opt/airflow/validation

    - ./monitoring:/opt/airflow/monitoring

    - ./utils:/opt/airflow/utils

    - ./datasets:/opt/airflow/datasets

  depends_on:

    postgres:

      condition: service_healthy

services:

  postgres:

    image: postgres:15

    environment:

      POSTGRES_USER: airflow

      POSTGRES_PASSWORD: airflow

      POSTGRES_DB: airflow

    healthcheck:

      test: ["CMD", "pg_isready", "-U", "airflow"]

      interval: 10s

      retries: 5

  airflow-init:

    <<: *airflow-common

    entrypoint: /bin/bash

    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@company.com"

  airflow-webserver:

    <<: *airflow-common

    command: webserver

    ports:

      - "8080:8080"

  airflow-scheduler:

    <<: *airflow-common

    command: scheduler

  airflow-triggerer:

    <<: *airflow-common

    command: triggerer
